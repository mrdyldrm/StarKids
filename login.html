<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yıldız Çocuklar — Giriş</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="js/client.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden"
      style="background: linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#a21caf 100%)">

  <!-- Yüzen yıldızlar -->
  <div id="stars" class="fixed inset-0 pointer-events-none"></div>

  <!-- Giriş kartı -->
  <div class="relative z-10 w-full max-w-sm mx-4">
    <div class="bg-white rounded-3xl shadow-2xl px-8 py-10 text-center">

      <!-- Logo -->
      <div class="text-7xl mb-3 inline-block animate-bounce">⭐</div>
      <h1 class="text-4xl font-black text-purple-700 leading-tight">Yıldız</h1>
      <h1 class="text-4xl font-black text-yellow-400 leading-tight mb-2">Çocuklar</h1>
      <p class="text-gray-400 font-semibold mb-8 text-sm">Çocuklarınızın gelişimini takip edin</p>

      <!-- Form -->
      <form id="loginForm" class="space-y-4" novalidate>
        <input id="email" type="email" placeholder="📧  E-posta adresiniz"
               class="w-full px-4 py-3 rounded-2xl border-2 border-purple-200 focus:border-purple-500
                      focus:outline-none text-base font-semibold transition-colors" required>

        <input id="password" type="password" placeholder="🔒  Şifreniz"
               class="w-full px-4 py-3 rounded-2xl border-2 border-purple-200 focus:border-purple-500
                      focus:outline-none text-base font-semibold transition-colors" required>

        <div id="errMsg"
             class="hidden bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl text-sm font-bold">
        </div>

        <button type="submit" id="loginBtn"
                class="w-full bg-purple-600 hover:bg-purple-700 active:scale-95 text-white font-black
                       text-lg py-4 rounded-2xl transition-all shadow-lg shadow-purple-300">
          🚀 Giriş Yap
        </button>
      </form>

      <p class="mt-6 text-xs text-gray-400 font-semibold">
        Hesap oluşturmak için Supabase panelini kullanın
      </p>
    </div>
  </div>

  <script>
    /* Yüzen yıldız emojileri */
    const pool = ['⭐','🌟','✨','💫','🌙','🎈','🎉'];
    const cont = document.getElementById('stars');
    for (let i = 0; i < 25; i++) {
      const s = document.createElement('span');
      s.textContent = pool[Math.floor(Math.random() * pool.length)];
      const size = Math.random() * 22 + 10;
      s.style.cssText = `
        position:absolute;
        font-size:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        animation:float ${Math.random()*3+2}s ease-in-out infinite;
        animation-delay:${Math.random()*3}s;
        opacity:.65;
        user-select:none;
      `;
      cont.appendChild(s);
    }

    /* Zaten oturum açıksa yönlendir */
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();

    /* Giriş formu */
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errMsg   = document.getElementById('errMsg');

      btn.disabled    = true;
      btn.textContent = '⏳ Giriş yapılıyor…';
      errMsg.classList.add('hidden');

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        const code = error.code || error.message || '';
        let msg = '⚠️ E-posta veya şifre hatalı!';
        if (code.includes('email_not_confirmed') || code.includes('Email not confirmed')) {
          msg = '📧 E-posta adresiniz henüz onaylanmamış. Gelen kutunuzu kontrol edin veya yöneticiden yeniden gönderme isteyin.';
        } else if (code.includes('invalid_credentials') || code.includes('Invalid login')) {
          msg = '⚠️ E-posta veya şifre hatalı!';
        } else if (error.message) {
          msg = '⚠️ ' + error.message;
        }
        errMsg.textContent = msg;
        errMsg.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = '🚀 Giriş Yap';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
