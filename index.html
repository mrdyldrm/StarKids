<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yıldız Çocuklar — Ana Sayfa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="js/client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/toast.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-50 min-h-screen">

  <div id="navbar"></div>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Başlık -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-3xl font-black text-purple-800">🏠 Ana Sayfa</h2>
        <p class="text-purple-400 font-semibold">Tüm çocukların puan durumu</p>
      </div>
      <a href="children.html"
         class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white
                font-bold px-5 py-3 rounded-2xl shadow-lg transition-all hover:scale-105">
        ➕ Çocuk Ekle
      </a>
    </div>

    <!-- Özet istatistikler -->
    <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8"></div>

    <!-- Çocuk kartları -->
    <div id="childrenGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
      <div class="col-span-full flex items-center justify-center py-12">
        <div class="text-5xl animate-spin">⭐</div>
      </div>
    </div>

    <!-- Son aktiviteler -->
    <div class="bg-white rounded-3xl shadow-sm border border-purple-100 p-6">
      <h3 class="text-xl font-black text-purple-700 mb-4">🕐 Son Aktiviteler</h3>
      <div id="activityList" class="space-y-2">
        <p class="text-gray-400 text-center py-4 font-semibold">Yükleniyor…</p>
      </div>
    </div>
  </main>

  <!-- Hızlı puan modalı -->
  <div id="quickModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-4">
    <div class="modal-box bg-white rounded-3xl shadow-2xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 id="quickModalTitle" class="text-2xl font-black text-purple-700"></h3>
        <button onclick="closeQuickModal()" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
      </div>

      <!-- Çocuk adı -->
      <div id="quickChildName" class="flex items-center gap-3 bg-purple-50 rounded-2xl p-3 mb-4">
        <span id="quickChildAvatar" class="text-4xl"></span>
        <span id="quickChildNameText" class="font-black text-purple-800 text-lg"></span>
      </div>

      <!-- Kural seçimi -->
      <label class="block text-sm font-bold text-gray-600 mb-1">Kural Seçin</label>
      <select id="quickRuleSelect"
              class="w-full border-2 border-purple-200 rounded-2xl px-4 py-3 font-semibold
                     focus:outline-none focus:border-purple-500 mb-3">
        <option value="">— Kural seçin —</option>
      </select>

      <!-- Not -->
      <label class="block text-sm font-bold text-gray-600 mb-1">Not (isteğe bağlı)</label>
      <input id="quickNote" type="text" placeholder="Ek not ekleyin…"
             class="w-full border-2 border-purple-200 rounded-2xl px-4 py-3 font-semibold
                    focus:outline-none focus:border-purple-500 mb-5">

      <button id="quickSaveBtn" onclick="saveQuickPoint()"
              class="w-full font-black text-lg py-4 rounded-2xl text-white transition-all
                     hover:scale-105 active:scale-95 shadow-lg">
        Kaydet
      </button>
    </div>
  </div>

  <script>
    let quickType = '';  // 'reward' | 'penalty'
    let quickChildId = '';

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      renderNav('dashboard');
      await loadStats();
      await loadChildren();
      await loadActivity();
    })();

    /* ── İstatistik satırı ── */
    async function loadStats() {
      const [{ data: children }, { data: rl }, { data: pl }] = await Promise.all([
        supabaseClient.from('children').select('id'),
        supabaseClient.from('reward_logs').select('points'),
        supabaseClient.from('penalty_logs').select('points'),
      ]);
      const totalReward  = (rl  || []).reduce((s, r) => s + r.points, 0);
      const totalPenalty = (pl  || []).reduce((s, r) => s + r.points, 0);

      document.getElementById('statsRow').innerHTML = `
        ${stat('👨‍👩‍👧', 'Çocuk Sayısı',    (children||[]).length,  'purple')}
        ${stat('⭐', 'Toplam Ödül Puanı', totalReward,             'green')}
        ${stat('⚡', 'Toplam Ceza Puanı', totalPenalty,            'red')}
        ${stat('🏆', 'Net Puan',          totalReward-totalPenalty, totalReward>=totalPenalty?'green':'red')}
      `;
    }

    function stat(icon, label, value, color) {
      const colors = {
        purple: 'bg-purple-100 text-purple-700',
        green:  'bg-green-100  text-green-700',
        red:    'bg-red-100    text-red-700',
      };
      return `
        <div class="${colors[color]} rounded-2xl p-4 text-center shadow-sm">
          <div class="text-3xl mb-1">${icon}</div>
          <div class="score-badge">${value}</div>
          <div class="text-xs font-bold mt-1 opacity-75">${label}</div>
        </div>
      `;
    }

    /* ── Çocuk kartları ── */
    async function loadChildren() {
      const { data, error } = await supabaseClient
        .from('children_scores')
        .select('*')
        .order('name');

      const grid = document.getElementById('childrenGrid');

      if (error || !data || data.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-14">
            <div class="text-6xl mb-4">👶</div>
            <p class="text-gray-400 font-bold text-lg">Henüz çocuk eklenmemiş</p>
            <a href="children.html"
               class="inline-block mt-4 bg-purple-600 text-white font-bold px-6 py-3 rounded-2xl hover:bg-purple-700">
              ➕ İlk Çocuğu Ekle
            </a>
          </div>`;
        return;
      }

      grid.innerHTML = data.map(c => childCard(c)).join('');
    }

    function childCard(c) {
      const net   = c.net_score;
      const netCls = net >= 0 ? 'text-green-600' : 'text-red-500';
      const netSign = net >= 0 ? '+' : '';
      return `
        <div class="child-card bg-white rounded-3xl shadow-md border border-purple-100 p-5
                    hover:border-purple-300 flex flex-col gap-4">
          <!-- Üst satır -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span class="text-5xl">${c.avatar}</span>
              <div>
                <div class="font-black text-xl text-gray-800">${c.name}</div>
                <div class="text-xs text-gray-400 font-semibold">
                  Net Puan: <span class="font-black ${netCls}">${netSign}${net}</span>
                </div>
              </div>
            </div>
            <a href="child-detail.html?id=${c.id}"
               class="text-purple-500 hover:text-purple-700 text-2xl font-bold p-2 rounded-xl
                      hover:bg-purple-50 transition-colors" title="Detay">›</a>
          </div>

          <!-- Puanlar -->
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-green-50 rounded-2xl p-3 text-center border border-green-100">
              <div class="text-2xl">⭐</div>
              <div class="font-black text-green-700 text-xl">${c.total_reward_points}</div>
              <div class="text-xs text-green-500 font-bold">Ödül</div>
            </div>
            <div class="bg-red-50 rounded-2xl p-3 text-center border border-red-100">
              <div class="text-2xl">⚡</div>
              <div class="font-black text-red-600 text-xl">${c.total_penalty_points}</div>
              <div class="text-xs text-red-400 font-bold">Ceza</div>
            </div>
          </div>

          <!-- Hızlı butonlar -->
          <div class="grid grid-cols-2 gap-2">
            <button onclick="openQuickModal('reward','${c.id}','${c.name}','${c.avatar}')"
                    class="flex items-center justify-center gap-1 bg-green-500 hover:bg-green-600
                           text-white font-bold py-2 rounded-xl text-sm transition-all hover:scale-105">
              ⭐ Ödül Ver
            </button>
            <button onclick="openQuickModal('penalty','${c.id}','${c.name}','${c.avatar}')"
                    class="flex items-center justify-center gap-1 bg-red-500 hover:bg-red-600
                           text-white font-bold py-2 rounded-xl text-sm transition-all hover:scale-105">
              ⚡ Ceza Ver
            </button>
          </div>
        </div>
      `;
    }

    /* ── Son aktiviteler ── */
    async function loadActivity() {
      const [{ data: rl }, { data: pl }] = await Promise.all([
        supabaseClient
          .from('reward_logs')
          .select('*, children(name,avatar)')
          .order('created_at', { ascending: false })
          .limit(10),
        supabaseClient
          .from('penalty_logs')
          .select('*, children(name,avatar)')
          .order('created_at', { ascending: false })
          .limit(10),
      ]);

      const all = [
        ...(rl || []).map(r => ({ ...r, type: 'reward'  })),
        ...(pl || []).map(r => ({ ...r, type: 'penalty' })),
      ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 15);

      const list = document.getElementById('activityList');
      if (all.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-center py-6 font-semibold">Henüz aktivite yok</p>';
        return;
      }

      list.innerHTML = all.map(item => {
        const isReward = item.type === 'reward';
        const dt = new Date(item.created_at).toLocaleString('tr-TR', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
        return `
          <div class="log-${item.type} rounded-2xl px-4 py-3 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 flex-1 min-w-0">
              <span class="text-2xl flex-shrink-0">${item.children?.avatar || '🧒'}</span>
              <div class="min-w-0">
                <div class="font-bold text-gray-800 truncate">
                  ${item.children?.name} — ${item.rule_icon || (isReward ? '⭐' : '⚡')} ${item.rule_title}
                </div>
                ${item.note ? `<div class="text-xs text-gray-500 truncate">${item.note}</div>` : ''}
                <div class="text-xs text-gray-400">${dt}</div>
              </div>
            </div>
            <span class="font-black text-lg flex-shrink-0 ${isReward ? 'text-green-600' : 'text-red-500'}">
              ${isReward ? '+' : '-'}${item.points}
            </span>
          </div>
        `;
      }).join('');
    }

    /* ── Hızlı modal ── */
    async function openQuickModal(type, childId, childName, childAvatar) {
      quickType    = type;
      quickChildId = childId;

      const isReward = type === 'reward';
      document.getElementById('quickModalTitle').textContent    = isReward ? '⭐ Ödül Ver' : '⚡ Ceza Ver';
      document.getElementById('quickChildAvatar').textContent   = childAvatar;
      document.getElementById('quickChildNameText').textContent = childName;

      const btn = document.getElementById('quickSaveBtn');
      btn.className = btn.className.replace(/bg-\w+-\d+|shadow-\w+/g, '');
      btn.classList.add(isReward ? 'bg-green-500' : 'bg-red-500',
                        isReward ? 'shadow-green-300' : 'shadow-red-300');
      btn.textContent = isReward ? '⭐ Ödülü Kaydet' : '⚡ Cezayı Kaydet';

      /* Kuralları yükle */
      const table = isReward ? 'reward_rules' : 'penalty_rules';
      const { data } = await supabaseClient.from(table).select('*').order('title');
      const sel = document.getElementById('quickRuleSelect');
      sel.innerHTML = '<option value="">— Kural seçin —</option>' +
        (data || []).map(r => `<option value="${r.id}" data-points="${r.points}" data-icon="${r.icon}"
          data-title="${r.title}">${r.icon} ${r.title} (+${r.points} puan)</option>`).join('');

      document.getElementById('quickNote').value = '';
      document.getElementById('quickModal').classList.remove('hidden');
    }

    function closeQuickModal() {
      document.getElementById('quickModal').classList.add('hidden');
    }

    async function saveQuickPoint() {
      const sel   = document.getElementById('quickRuleSelect');
      const opt   = sel.options[sel.selectedIndex];
      const note  = document.getElementById('quickNote').value.trim();

      if (!sel.value) { showToast('Lütfen bir kural seçin!', 'warning'); return; }

      const ruleId    = sel.value;
      const points    = parseInt(opt.dataset.points);
      const ruleTitle = opt.dataset.title;
      const ruleIcon  = opt.dataset.icon;

      const table = quickType === 'reward' ? 'reward_logs' : 'penalty_logs';
      const { error } = await supabaseClient.from(table).insert({
        child_id: quickChildId, rule_id: ruleId, rule_title: ruleTitle,
        rule_icon: ruleIcon, points, note,
      });

      if (error) { showToast('Hata oluştu: ' + error.message, 'error'); return; }

      showToast(quickType === 'reward' ? '⭐ Ödül başarıyla verildi!' : '⚡ Ceza kaydedildi!',
                quickType === 'reward' ? 'success' : 'info');
      closeQuickModal();
      await loadStats();
      await loadChildren();
      await loadActivity();
    }

    /* Modal dışına tıklayınca kapat */
    document.getElementById('quickModal').addEventListener('click', e => {
      if (e.target === document.getElementById('quickModal')) closeQuickModal();
    });
  </script>
</body>
</html>
