<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yıldız Çocuklar — Dönemler</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="js/client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/periods.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-50 min-h-screen">

  <div id="navbar">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 no-underline">
          <span class="text-3xl">⭐</span>
          <div>
            <div class="font-black text-purple-700 text-xl leading-tight">Yıldız Çocuklar</div>
            <div class="text-xs text-purple-400 font-semibold">Yönetim Paneli</div>
          </div>
        </a>
        <div class="w-10 h-10 rounded-full bg-purple-100 animate-pulse"></div>
      </div>
    </nav>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- Başlık -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-3xl font-black text-purple-800">📅 Dönemler</h2>
        <p class="text-purple-400 font-semibold">Takip dönemlerini yönetin</p>
      </div>
      <button onclick="openAddPeriodModal()"
              class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white
                     font-bold px-5 py-3 rounded-2xl shadow-lg transition-all hover:scale-105">
        ➕ Yeni Dönem
      </button>
    </div>

    <!-- Toplu Ekleme -->
    <div class="bg-white rounded-3xl shadow-sm border border-purple-100 p-6 mb-6">
      <h3 class="text-lg font-black text-purple-700 mb-4">📦 Toplu Ekle</h3>
      <div class="grid sm:grid-cols-2 gap-4">

        <!-- Aylık -->
        <div class="bg-purple-50 rounded-2xl p-4 border border-purple-100">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-2xl">🗓️</span>
            <span class="font-black text-purple-700">Tüm Aylar</span>
          </div>
          <div class="flex items-center gap-2 mb-2">
            <select id="bulkMonthYear" onchange="updateBulkPreview('monthly')"
                    class="flex-1 border-2 border-purple-200 rounded-xl px-3 py-2 font-bold
                           text-purple-700 focus:outline-none bg-white text-sm">
            </select>
            <button onclick="bulkAddFromPage('monthly')"
                    class="bg-purple-600 hover:bg-purple-700 text-white font-bold
                           px-4 py-2 rounded-xl text-sm transition-all hover:scale-105">
              Ekle
            </button>
          </div>
          <p id="bulkMonthPreview" class="text-xs text-purple-500 font-semibold h-4"></p>
        </div>

        <!-- Haftalık -->
        <div class="bg-indigo-50 rounded-2xl p-4 border border-indigo-100">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-2xl">📅</span>
            <span class="font-black text-indigo-700">Tüm Haftalar</span>
          </div>
          <div class="flex items-center gap-2 mb-2">
            <select id="bulkWeekYear" onchange="updateBulkPreview('weekly')"
                    class="flex-1 border-2 border-indigo-200 rounded-xl px-3 py-2 font-bold
                           text-indigo-700 focus:outline-none bg-white text-sm">
            </select>
            <button onclick="bulkAddFromPage('weekly')"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold
                           px-4 py-2 rounded-xl text-sm transition-all hover:scale-105">
              Ekle
            </button>
          </div>
          <p id="bulkWeekPreview" class="text-xs text-indigo-500 font-semibold h-4"></p>
        </div>

      </div>
    </div>

    <!-- Dönem Listesi -->
    <div class="bg-white rounded-3xl shadow-sm border border-purple-100 p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-black text-purple-700">📋 Dönemler</h3>
        <span id="periodCount" class="text-sm text-purple-400 font-semibold"></span>
      </div>

      <!-- Tür filtresi -->
      <div class="flex flex-wrap gap-2 mb-4" id="filterBtns">
        <button onclick="setFilter('')"
                class="pf-btn active px-4 py-1.5 rounded-full border-2 border-purple-200
                       font-black text-sm text-purple-700 bg-white transition-all">Tümü</button>
        <button onclick="setFilter('monthly')"
                class="pf-btn px-4 py-1.5 rounded-full border-2 border-purple-200
                       font-black text-sm text-purple-700 bg-white transition-all">🗓️ Aylık</button>
        <button onclick="setFilter('weekly')"
                class="pf-btn px-4 py-1.5 rounded-full border-2 border-purple-200
                       font-black text-sm text-purple-700 bg-white transition-all">📅 Haftalık</button>
        <button onclick="setFilter('custom')"
                class="pf-btn px-4 py-1.5 rounded-full border-2 border-purple-200
                       font-black text-sm text-purple-700 bg-white transition-all">✏️ Özel</button>
      </div>

      <div id="periodPageList" class="space-y-1">
        <div class="text-center py-10"><div class="text-4xl animate-spin">⭐</div></div>
      </div>
    </div>

  </main>

  <style>
    .pf-btn:hover  { background: #f3e8ff; }
    .pf-btn.active { background: #7C3AED !important; color: #fff !important;
                     border-color: #7C3AED !important; }
  </style>

  <!-- Silme onayı -->
  <div id="pageDeleteModal"
       class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-4">
    <div class="modal-box bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 text-center">
      <div class="text-5xl mb-3">🗑️</div>
      <h3 class="text-xl font-black text-gray-800 mb-2">Dönemi Sil</h3>
      <p class="text-gray-500 font-semibold mb-6">
        "<span id="delPeriodName" class="text-red-500 font-black"></span>"
        dönemi silinecek.
      </p>
      <div class="flex gap-3">
        <button onclick="document.getElementById('pageDeleteModal').classList.add('hidden')"
                class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold
                       py-3 rounded-2xl transition-colors">İptal</button>
        <button id="confirmDelPeriod"
                class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold
                       py-3 rounded-2xl transition-colors">🗑️ Sil</button>
      </div>
    </div>
  </div>

  <script>
    const TYPE_META = {
      monthly: { icon: '🗓️', label: 'Aylık',   cls: 'bg-purple-100 text-purple-700' },
      weekly:  { icon: '📅', label: 'Haftalık', cls: 'bg-indigo-100 text-indigo-700' },
      custom:  { icon: '✏️', label: 'Özel',     cls: 'bg-gray-100   text-gray-600'   },
    };

    let pageFilter = '';

    /* Periods.js'den veri geldiğinde liste yenilenir */
    window.onPeriodsLoaded = function(periods) {
      renderPageList(periods);
      updateBulkPreview('monthly');
      updateBulkPreview('weekly');
    };

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      const ok = await requireRole(['admin']);
      if (!ok) return;
      renderNav('periods');
      buildYearSelectors();
      await initPeriodsGlobal();   // modaller + _loadAndRender → onPeriodsLoaded tetiklenir
    })();

    /* ── Yıl seçicileri ── */
    function buildYearSelectors() {
      const cy  = new Date().getFullYear();
      const opts = Array.from({ length: 7 }, (_, i) => cy - 2 + i)
        .map(y => `<option value="${y}"${y === cy ? ' selected' : ''}>${y}</option>`).join('');
      document.getElementById('bulkMonthYear').innerHTML = opts;
      document.getElementById('bulkWeekYear').innerHTML  = opts;
    }

    function updateBulkPreview(type) {
      const yearId  = type === 'monthly' ? 'bulkMonthYear' : 'bulkWeekYear';
      const prevId  = type === 'monthly' ? 'bulkMonthPreview' : 'bulkWeekPreview';
      const yearEl  = document.getElementById(yearId);
      if (!yearEl) return;
      const year    = parseInt(yearEl.value);
      const gen     = type === 'monthly' ? _generateMonthlyPeriods(year) : _generateWeeklyPeriods(year);
      const exists  = new Set(allPeriods.map(p => p.start_date));
      const toAdd   = gen.filter(p => !exists.has(p.start_date));
      const el      = document.getElementById(prevId);
      if (!el) return;
      if (toAdd.length === 0) {
        el.textContent = `✅ ${year} yılının tüm dönemleri zaten eklendi.`;
      } else {
        const skip = gen.length - toAdd.length;
        el.textContent = `${toAdd.length} dönem eklenecek${skip > 0 ? `, ${skip} mevcut` : ''}.`;
      }
    }

    async function bulkAddFromPage(type) {
      const yearId = type === 'monthly' ? 'bulkMonthYear' : 'bulkWeekYear';
      const year   = parseInt(document.getElementById(yearId).value);
      const gen    = type === 'monthly' ? _generateMonthlyPeriods(year) : _generateWeeklyPeriods(year);
      const exists = new Set(allPeriods.map(p => p.start_date));
      const toAdd  = gen.filter(p => !exists.has(p.start_date));

      if (toAdd.length === 0) {
        showToast(`${year} yılının tüm dönemleri zaten mevcut!`, 'info');
        return;
      }
      const { error } = await supabaseClient.from('periods').insert(toAdd);
      if (error) { showToast('Hata: ' + error.message, 'error'); return; }
      showToast(`✅ ${toAdd.length} dönem eklendi!`, 'success');
      await _loadAndRender();  // periods.js → onPeriodsLoaded tetiklenir
    }

    /* ── Liste ── */
    function setFilter(type) {
      pageFilter = type;
      document.querySelectorAll('.pf-btn').forEach((b, i) => {
        const types = ['', 'monthly', 'weekly', 'custom'];
        b.classList.toggle('active', types[i] === type);
      });
      renderPageList(allPeriods);
    }

    function renderPageList(periods) {
      const filtered = pageFilter ? periods.filter(p => p.type === pageFilter) : periods;
      document.getElementById('periodCount').textContent =
        `${filtered.length} dönem` + (filtered.length !== periods.length ? ' (filtrelendi)' : '');

      const el = document.getElementById('periodPageList');
      if (!el) return;

      if (filtered.length === 0) {
        el.innerHTML = `
          <div class="text-center py-10">
            <div class="text-5xl mb-3">📅</div>
            <p class="text-gray-400 font-bold">
              ${pageFilter ? 'Bu türde dönem bulunamadı' : 'Henüz dönem eklenmemiş'}
            </p>
            <button onclick="openAddPeriodModal()"
                    class="mt-3 bg-purple-600 text-white font-bold px-5 py-2 rounded-2xl
                           hover:bg-purple-700 text-sm">➕ Dönem Ekle</button>
          </div>`;
        return;
      }

      /* Yıla göre grupla */
      const byYear = {};
      filtered.forEach(p => {
        const y = p.start_date.slice(0, 4);
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(p);
      });

      el.innerHTML = Object.keys(byYear).sort((a, b) => b - a).map(year => `
        <div class="mb-4">
          <div class="text-xs font-black text-purple-400 uppercase tracking-widest px-1 mb-2">
            ${year}
          </div>
          ${byYear[year].map(p => periodRow(p)).join('')}
        </div>
      `).join('');
    }

    function periodRow(p) {
      const m = TYPE_META[p.type] || TYPE_META.custom;
      return `
        <div class="flex items-center gap-3 px-4 py-3 rounded-2xl border border-gray-100
                    bg-white hover:bg-purple-50 transition-colors group mb-1">
          <span class="text-xl flex-shrink-0">${m.icon}</span>
          <div class="flex-1 min-w-0">
            <div class="font-black text-gray-800 truncate">${p.name}</div>
            <div class="text-xs text-gray-400 font-semibold">
              ${p.start_date} → ${p.end_date}
            </div>
          </div>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${m.cls}">
            ${m.label}
          </span>
          <div class="flex gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="openAddPeriodModal('${p.id}')"
                    class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-bold
                           px-2 py-1 rounded-xl text-xs">✏️</button>
            <button onclick="askDeletePeriod('${p.id}')"
                    class="bg-red-100 hover:bg-red-200 text-red-600 font-bold
                           px-2 py-1 rounded-xl text-xs">🗑️</button>
          </div>
        </div>`;
    }

    /* ── Silme ── */
    function askDeletePeriod(id) {
      const p = allPeriods.find(x => x.id === id);
      if (!p) return;
      document.getElementById('delPeriodName').textContent = p.name;
      document.getElementById('pageDeleteModal').classList.remove('hidden');
      document.getElementById('confirmDelPeriod').onclick = async () => {
        document.getElementById('pageDeleteModal').classList.add('hidden');
        await deletePeriodById(id);  // periods.js → _loadAndRender → onPeriodsLoaded
      };
    }

    document.getElementById('pageDeleteModal').addEventListener('click', e => {
      if (e.target.id === 'pageDeleteModal')
        document.getElementById('pageDeleteModal').classList.add('hidden');
    });
  </script>
</body>
</html>
